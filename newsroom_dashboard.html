<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקהילה - דשבורד מערכת</title>

<style>
  :root {
    --bg-color: #111;
    --header-bg: #000;
    --accent-color: #ffcc00;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg-color);
    color: white;
    overflow: hidden;
  }

  .header {
    height: 80px;
    background: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    border-bottom: 2px solid #333;
  }

  .logo img {
    height: 55px;
    object-fit: contain;
  }

  .title {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .clock {
    font-size: 32px;
    font-family: monospace;
    font-weight: bold;
    color: var(--accent-color);
  }

  .sheet-container {
    height: calc(100vh - 150px);
    background: #fff;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .ticker-container {
    height: 70px;
    background: var(--header-bg);
    display: flex;
    align-items: center;
    border-top: 2px solid #333;
    position: fixed;
    bottom: 0;
    width: 100%;
  }

  .ticker-label {
    background: #ce0000;
    color: white;
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    z-index: 10;
    box-shadow: 5px 0 15px rgba(0,0,0,0.5);
    white-space: nowrap;
  }

  marquee {
    font-size: 26px;
    font-weight: 500;
  }

  .news-item {
    display: inline-block;
    padding: 0 15px;
  }

  .news-time {
    color: var(--accent-color);
    font-weight: bold;
    margin-left: 8px;
  }
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="לוגו בקהילה הכי טובים_Page_1.png" alt="בקהילה">
  </div>
  <div class="title">סטטוס מערכת העיתון</div>
  <div id="clock" class="clock">00:00:00</div>
</div>

<div class="sheet-container">
  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCDpS9vmjf-R3YwGXJzvlBhnNDVybD9PQ3ZctQx7rUNDSfouU-GmlD-YuR6lgtTn_0Pe1uKSchrRuH/pubhtml?widget=true&headers=false"></iframe>
</div>

<div class="ticker-container">
  <div class="ticker-label">סקופים - רוטר</div>
  <marquee id="ticker" scrollamount="6">מתחבר ללוח הסקופים...</marquee>
</div>

<script>
// שעון
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// שימוש בפיד ה"סקופים" המהיר יותר
const RSS_URL = "https://rotter.net/rss/rotter.xml";

async function loadNews() {
  try {
    // הוספת מזהה ייחודי כדי לעקוף Cache של ה-Proxy
    const cacheBuster = encodeURIComponent(new Date().getTime());
    const PROXY_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}&nocache=${cacheBuster}`;

    const response = await fetch(PROXY_URL);
    const data = await response.json();

    if (data.status === 'ok' && data.items.length > 0) {
      const newsHtml = data.items.slice(0, 12).map(item => {
        // עיבוד השעה מהפיד
        const pubDate = new Date(item.pubDate);
        const timeStr = pubDate.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });
        
        // ניקוי טקסט מיותר אם קיים בכותרת
        let cleanTitle = item.title.replace(/&quot;/g, '"').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
        
        return `<span class="news-item"><span class="news-time">${timeStr}</span> ${cleanTitle}</span>`;
      }).join(' <span style="color:#444"> | </span> ');

      document.getElementById("ticker").innerHTML = newsHtml;
    }
  } catch (error) {
    console.error("News Load Error:", error);
    // במקרה של שגיאה, לא נמחוק את מה שיש בטיקר אלא ננסה שוב בשקט
  }
}

// טעינה ועדכון כל 2 דקות (כדי לא להיחסם ע"י ה-Proxy)
loadNews();
setInterval(loadNews, 120000); 

</script>

</body>
</html>
