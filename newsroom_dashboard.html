<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקהילה - דשבורד מערכת</title>

<style>
  :root {
    --bg-color: #111;
    --header-bg: #000;
    --accent-color: #ffcc00; /* צבע זהב/צהוב לזמנים */
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg-color);
    color: white;
    overflow: hidden; /* מונע גלילה מיותרת של הדף */
  }

  .header {
    height: 80px;
    background: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    border-bottom: 2px solid #333;
  }

  .logo img {
    height: 55px;
    object-fit: contain;
  }

  .title {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .clock {
    font-size: 32px;
    font-family: monospace;
    font-weight: bold;
    color: var(--accent-color);
  }

  .sheet-container {
    height: calc(100vh - 150px); /* התאמה לגובה המסך פחות הידר וטיקר */
    background: #fff;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .ticker-container {
    height: 70px;
    background: var(--header-bg);
    display: flex;
    align-items: center;
    border-top: 2px solid #333;
    position: fixed;
    bottom: 0;
    width: 100%;
  }

  .ticker-label {
    background: #ce0000;
    color: white;
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    z-index: 10;
    box-shadow: 5px 0 15px rgba(0,0,0,0.5);
  }

  marquee {
    font-size: 28px;
    font-weight: 500;
  }

  .news-item {
    display: inline-block;
    padding: 0 15px;
  }

  .news-time {
    color: var(--accent-color);
    font-weight: bold;
    margin-left: 8px;
  }
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="לוגו בקהילה הכי טובים_Page_1.png" alt="בקהילה">
  </div>
  <div class="title">סטטוס מערכת העיתון</div>
  <div id="clock" class="clock">00:00:00</div>
</div>

<div class="sheet-container">
  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCDpS9vmjf-R3YwGXJzvlBhnNDVybD9PQ3ZctQx7rUNDSfouU-GmlD-YuR6lgtTn_0Pe1uKSchrRuH/pubhtml?widget=true&headers=false"></iframe>
</div>

<div class="ticker-container">
  <div class="ticker-label">מבזקי רוטר</div>
  <marquee id="ticker" scrollamount="6">טוען מבזקים אחרונים...</marquee>
</div>

<script>
// עדכון שעון מדויק
function updateClock() {
  const now = new Date();
  const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  document.getElementById("clock").innerText = now.toLocaleTimeString('he-IL', options);
}
setInterval(updateClock, 1000);
updateClock();

// הגדרות חדשות רוטר
// שימוש ב-rss2json כדי לעקוף בעיות CORS
const RSS_URL = "https://rotter.net/rss/rotternews.xml";
const API_KEY = ""; // ניתן להוסיף מפתח אם יש, כרגע עובד בלי
const PROXY_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

async function loadNews() {
  try {
    const response = await fetch(PROXY_URL + "&t=" + Date.now());
    const data = await response.json();

    if (data.status === 'ok') {
      const items = data.items.slice(0, 10); // לוקחים את 10 המבזקים האחרונים
      const newsHtml = items.map(item => {
        // חילוץ שעה מתוך תאריך הפרסום
        const pubDate = new Date(item.pubDate);
        const timeStr = pubDate.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });
        
        return `<span class="news-item"><span class="news-time">${timeStr}</span> ${item.title}</span>`;
      }).join(' <span style="color:#555">|</span> ');

      document.getElementById("ticker").innerHTML = newsHtml;
    }
  } catch (error) {
    console.error("Error fetching news:", error);
    document.getElementById("ticker").innerText = "שגיאה בטעינת מבזקים";
  }
}

// טעינה ראשונית ועדכון כל דקה
loadNews();
setInterval(loadNews, 60000); 

</script>

</body>
</html>
