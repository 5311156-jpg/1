<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>בקהילה - דשבורד</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.header {
  height: 80px;
  background: black;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 2px solid #222;
}

.logo img {
  height: 50px;
}

.title {
  font-size: 24px;
}

.clock {
  font-size: 22px;
}

.sheet {
  height: calc(100vh - 140px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

.ticker {
  height: 60px;
  background: black;
  display: flex;
  align-items: center;
  font-size: 28px;
}

marquee {
  width: 100%;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="לוגו בקהילה הכי טובים_Page_1.png" alt="בקהילה">
  </div>
  <div class="title">סטטוס מערכת העיתון</div>
  <div class="clock" id="clock"></div>
</div>

<div class="sheet">
  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCDpS9vmjf-R3YwGXJzvlBhnNDVybD9PQ3ZctQx7rUNDSfouU-GmlD-YuR6lgtTn_0Pe1uKSchrRuH/pubhtml?widget=true&headers=false"></iframe>
</div>

<div class="ticker">
  <marquee id="ticker" scrollamount="6">טוען חדשות...</marquee>
</div>

<script>
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').innerText = h + ':' + m;
}
setInterval(updateClock, 1000);
updateClock();

function decodeText(str) {
  var txt = document.createElement('textarea');
  txt.innerHTML = str;
  var decoded = txt.value;

  var txt2 = document.createElement('textarea');
  txt2.innerHTML = decoded;
  decoded = txt2.value;

  return decoded
    .replace(/&#?\w+;/g, '')
    .replace(/&quot;/g, '"')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .trim();
}

function formatIsraelTime(dateStr) {
  var d = new Date(dateStr);
  var h = String(d.getHours()).padStart(2, '0');
  var m = String(d.getMinutes()).padStart(2, '0');
  return h + ':' + m;
}

function loadNews() {
  var url = 'https://api.rss2json.com/v1/api.json?rss_url=' +
    encodeURIComponent('https://www.ynet.co.il/Integration/StoryRss2.xml') +
    '&cache_bust=' + Date.now();

  fetch(url, { cache: 'no-store' })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data.items || !data.items.length) {
        document.getElementById('ticker').innerText = 'אין חדשות להצגה כרגע';
        return;
      }

      var arr = [];

      data.items.slice(0, 8).forEach(function(item) {
        var time = formatIsraelTime(item.pubDate);
        var cleanTitle = decodeText(item.title);
        arr.push('🕒 ' + time + ' • ' + cleanTitle);
      });

      document.getElementById('ticker').innerText = arr.join('   ✦   ');
    })
    .catch(function() {
      document.getElementById('ticker').innerText = 'שגיאה בטעינת חדשות';
    });
}

loadNews();
setInterval(loadNews, 15000);
</script>

</body>
</html>
