<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בקהילה - דשבורד מערכת</title>

<style>
  :root {
    --bg-color: #111;
    --header-bg: #000;
    --accent-color: #ffcc00;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg-color);
    color: white;
    overflow: hidden;
  }

  .header {
    height: 80px;
    background: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    border-bottom: 2px solid #333;
  }

  .logo img { height: 55px; object-fit: contain; }
  .title { font-size: 28px; font-weight: bold; }
  .clock { font-size: 32px; font-family: monospace; font-weight: bold; color: var(--accent-color); }

  .sheet-container {
    height: calc(100vh - 150px);
    background: #fff;
  }

  iframe { width: 100%; height: 100%; border: none; }

  .ticker-container {
    height: 70px;
    background: var(--header-bg);
    display: flex;
    align-items: center;
    border-top: 2px solid #333;
    position: fixed;
    bottom: 0;
    width: 100%;
  }

  .ticker-label {
    background: #ce0000;
    color: white;
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    z-index: 10;
    box-shadow: 5px 0 15px rgba(0,0,0,0.5);
    white-space: nowrap;
  }

  marquee { font-size: 26px; font-weight: 500; }
  .news-item { display: inline-block; padding: 0 15px; }
  .news-time { color: var(--accent-color); font-weight: bold; margin-left: 8px; }
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="לוגו בקהילה הכי טובים_Page_1.png" alt="בקהילה">
  </div>
  <div class="title">סטטוס מערכת העיתון</div>
  <div id="clock" class="clock">00:00:00</div>
</div>

<div class="sheet-container">
  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCDpS9vmjf-R3YwGXJzvlBhnNDVybD9PQ3ZctQx7rUNDSfouU-GmlD-YuR6lgtTn_0Pe1uKSchrRuH/pubhtml?widget=true&headers=false"></iframe>
</div>

<div class="ticker-container">
  <div class="ticker-label">מבזקי רוטר</div>
  <marquee id="ticker" scrollamount="6">מתחבר לעדכוני סקופים...</marquee>
</div>

<script>
// שעון
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// פונקציית טעינת חדשות עם תיקון קידוד (Encoding)
async function loadNews() {
  const RSS_URL = "https://rotter.net/rss/rotternews.xml";
  // שימוש ב-AllOrigins כדי למשוך את המידע הגולמי (Raw)
  const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(RSS_URL)}&t=${Date.now()}`;

  try {
    const response = await fetch(PROXY_URL);
    const data = await response.json();
    
    // כאן קורה הקסם: אנחנו לוקחים את הטקסט הגולמי ומפענחים אותו כ-Windows-1255
    // AllOrigins מחזיר את התוכן ב-data.contents
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(data.contents, "text/xml");
    const items = xmlDoc.querySelectorAll("item");

    let newsHtml = "";
    items.forEach((item, index) => {
      if (index < 12) {
        const title = item.querySelector("title").textContent;
        const pubDate = item.querySelector("pubDate").textContent;
        
        // חילוץ שעה
        const dateObj = new Date(pubDate);
        const timeStr = dateObj.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });
        
        newsHtml += `<span class="news-item"><span class="news-time">${timeStr}</span> ${title}</span>`;
        if (index < 11) newsHtml += ' <span style="color:#444"> | </span> ';
      }
    });

    if (newsHtml) {
      document.getElementById("ticker").innerHTML = newsHtml;
    }
  } catch (error) {
    console.error("News error:", error);
  }
}

// עדכון כל דקה
loadNews();
setInterval(loadNews, 60000);
</script>

</body>
</html>
