<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>בקהילה - דשבורד</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

.header {
  height: 80px;
  background: black;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}

.logo img {
  height: 50px;
}

.title {
  font-size: 24px;
}

.clock {
  font-size: 22px;
}

.sheet {
  height: calc(100vh - 140px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

.ticker {
  height: 60px;
  background: black;
  display: flex;
  align-items: center;
  font-size: 26px;
}

marquee {
  width: 100%;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="לוגו בקהילה הכי טובים_Page_1.png">
  </div>
  <div class="title">סטטוס מערכת העיתון</div>
  <div class="clock" id="clock"></div>
</div>

<div class="sheet">
  <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRCDpS9vmjf-R3YwGXJzvlBhnNDVybD9PQ3ZctQx7rUNDSfouU-GmlD-YuR6lgtTn_0Pe1uKSchrRuH/pubhtml?widget=true&headers=false"></iframe>
</div>

<div class="ticker">
  <marquee id="ticker">טוען חדשות...</marquee>
</div>

<script>

// שעון
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();

// חדשות (פתרון פשוט)
const URL = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://rotter.net/rss/rotternews.xml");

function loadNews() {
  fetch(URL + "&t=" + Date.now())
    .then(res => res.json())
    .then(data => {

      const parser = new DOMParser();
      const xml = parser.parseFromString(data.contents, "text/xml");
      const items = xml.querySelectorAll("item");

      let arr = [];

      items.forEach((item,i)=>{
        if(i<8){
          let title = item.querySelector("title").textContent;
          let date = item.querySelector("pubDate").textContent;

          let d = new Date(date);
          d.setHours(d.getHours()+3);

          let time =
            d.getHours().toString().padStart(2,'0') + ":" +
            d.getMinutes().toString().padStart(2,'0');

          arr.push("🕒 " + time + " • " + title);
        }
      });

      document.getElementById("ticker").innerText = arr.join("   ✦   ");

    })
    .catch(()=>{
      document.getElementById("ticker").innerText = "שגיאה בטעינה";
    });
}

loadNews();
setInterval(loadNews,30000);

</script>

</body>
</html>
