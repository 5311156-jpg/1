<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>בקהילה - דשבורד</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.header {
  height: 80px;
  background: black;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 2px solid #222;
}

.logo img {
  height: 50px;
}

.title {
  font-size: 24px;
}

.clock {
  font-size: 22px;
}

.sheet {
  height: calc(100vh - 140px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.ticker {
  height: 60px;
  background: black;
  display: flex;
  align-items: center;
  font-size: 28px;
}

marquee {
  width: 100%;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="לוגו בקהילה הכי טובים_Page_1.png">
  </div>
  <div class="title">סטטוס מערכת העיתון</div>
  <div class="clock" id="clock"></div>
</div>

<div class="sheet">
  <iframe id="sheetFrame"></iframe>
</div>

<div class="ticker">
  <marquee id="ticker" scrollamount="6">טוען חדשות...</marquee>
</div>

<script>

// 🔥 קישור לשיטס
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRCDpS9vmjf-R3YwGXJzvlBhnNDVybD9PQ3ZctQx7rUNDSfouU-GmlD-YuR6lgtTn_0Pe1uKSchrRuH/pubhtml?widget=true&headers=false";

// CLOCK
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById("clock").innerText = h + ":" + m;
}
setInterval(updateClock, 1000);
updateClock();

// 🔥 רענון שיטס בלי קאש
function refreshSheet() {
  document.getElementById("sheetFrame").src =
    SHEET_URL + "&t=" + new Date().getTime();
}
